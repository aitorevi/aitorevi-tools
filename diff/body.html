<main class="wrap wrap-code">
    <header>
      <span class="badge"><span class="dot" aria-hidden="true"></span>{{t.badge}}</span>
      <h1>{{t.h1}}</h1>
      <p class="subtitle">{{t.subtitle}}</p>
    </header>

    <section class="card" aria-labelledby="app-title">
      <h2 id="app-title" class="sr">{{t.cardAria}}</h2>
      <div class="code-tool diff-tool">
        <div class="code-io">
          <label class="code-pane">
            <span class="field-label">{{t.original}}</span>
            <textarea class="code-area" id="diff-a" spellcheck="false"
                      aria-label="{{t.original}}"></textarea>
          </label>
          <label class="code-pane">
            <span class="field-label">{{t.modified}}</span>
            <textarea class="code-area" id="diff-b" spellcheck="false"
                      aria-label="{{t.modified}}"></textarea>
          </label>
        </div>

        <p class="code-alert" id="diff-alert" role="alert"></p>
        <p class="jwt-info" id="diff-summary" aria-live="polite"></p>

        <div class="code-pane">
          <span class="field-label">{{t.differences}}</span>
          <div class="code-area diff-output" id="diff-output" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>
