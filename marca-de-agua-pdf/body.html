<style>
    @media (min-width: 560px) { .controls { grid-template-columns: 1fr 1fr 1fr; align-items: end; } }
  </style>

  <main class="wrap">
    <header>
      <span class="badge"><span class="dot" aria-hidden="true"></span>{{t.badge}}</span>
      <h1>{{t.h1}}</h1>
      <p class="subtitle">{{t.subtitle}}</p>
    </header>

    <section class="card" aria-labelledby="app-title">
      <h2 id="app-title" class="sr">{{t.cardAria}}</h2>

      <div id="loader">
        <div id="dropzone" class="dropzone" tabindex="0" role="button"
             aria-label="{{t.dropAria}}">
          <div class="icon" aria-hidden="true">💧</div>
          <div class="lead">{{t.lead}}</div>
          <div class="hint">{{t.hint}}</div>
        </div>
        <input id="file-input" type="file" accept="application/pdf,.pdf" class="visually-hidden" />
      </div>

      <div id="workspace" class="hidden">
        <div class="file-bar">
          <div class="info">
            <span class="name" id="file-name">{{t.fileName}}</span>
            <span class="meta" id="file-meta">—</span>
          </div>
          <button class="btn ghost" id="reset-btn" type="button">{{t.reset}}</button>
        </div>

        <div class="controls">
          <label class="field">
            <span class="field-label">{{t.labelText}}</span>
            <input id="wm-text" type="text" value="{{t.textDefault}}" maxlength="60" />
          </label>
          <label class="field">
            <span class="field-label">{{t.labelOpacity}} <b id="wm-opacity-val">30%</b></span>
            <input id="wm-opacity" type="range" min="5" max="100" value="30" />
          </label>
          <label class="field">
            <span class="field-label">{{t.labelSize}} <b id="wm-size-val">48 pt</b></span>
            <input id="wm-size" type="range" min="12" max="120" value="48" />
          </label>
        </div>

        <div class="actions">
          <button class="btn primary" id="apply-btn" type="button">{{t.applyBtn}}</button>
        </div>

        <p class="status" id="status" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>
