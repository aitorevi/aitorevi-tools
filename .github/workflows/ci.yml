name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build (verify generated HTML is up to date)
        run: |
          npm run build
          git diff --exit-code || {
            echo "::error::El HTML generado no coincide con la fuente. Ejecuta 'npm run build' y commitea.";
            exit 1;
          }

      - name: Tests (unit + e2e)
        run: npm test
