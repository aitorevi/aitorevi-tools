name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build (verify generated HTML is up to date)
        run: |
          npm run build
          git diff --exit-code || {
            echo "::error::El HTML generado no coincide con la fuente. Ejecuta 'npm run build' y commitea.";
            exit 1;
          }

      - name: Tests (unit + e2e)
        run: npm test
