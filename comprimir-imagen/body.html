<style>
    @media (min-width: 480px) { .controls { grid-template-columns: 1fr 1fr; align-items: end; } }
  </style>

  <main class="wrap">
    <header>
      <span class="badge"><span class="dot" aria-hidden="true"></span>100% en tu navegador · sin subir nada</span>
      <h1>Comprimir imagen</h1>
      <p class="subtitle">Reduce el peso de tus imágenes ajustando la calidad y el tamaño. Todo en tu navegador.</p>
    </header>

    <section class="card" aria-labelledby="app-title">
      <h2 id="app-title" class="sr">Herramienta para comprimir imágenes</h2>

      <div id="loader">
        <div id="dropzone" class="dropzone" tabindex="0" role="button"
             aria-label="Selecciona o arrastra una imagen">
          <div class="icon" aria-hidden="true">🗜️</div>
          <div class="lead">Arrastra tu imagen aquí o <strong>haz clic para elegirla</strong></div>
          <div class="hint">JPG, PNG, WebP… Nada se envía a internet.</div>
        </div>
        <input id="file-input" type="file" accept="image/*" class="visually-hidden" />
      </div>

      <div id="workspace" class="hidden">
        <div class="preview-box">
          <img id="result-preview" alt="Vista previa del resultado de la compresión" />
        </div>
        <div class="preview-row">
          <span class="meta" id="file-info">—</span>
          <span class="spacer"></span>
          <button class="btn ghost" id="reset-btn" type="button">Otra imagen</button>
        </div>

        <div class="controls">
          <label class="field">
            <span class="field-label">Formato</span>
            <select id="format">
              <option value="image/webp">WebP (recomendado)</option>
              <option value="image/jpeg">JPG</option>
            </select>
          </label>
          <label class="field">
            <span class="field-label">Tamaño máximo</span>
            <select id="max-side"></select>
          </label>
          <label class="field">
            <span class="field-label">Peso objetivo (KB)</span>
            <input id="target-kb" type="number" min="0" step="5" inputmode="numeric" placeholder="auto (opcional)" />
          </label>
          <label class="field">
            <span class="field-label">Calidad <b id="quality-val">80%</b></span>
            <input id="quality" type="range" min="10" max="100" value="80" />
          </label>
        </div>

        <p class="estimate" id="estimate" aria-live="polite"></p>

        <div class="actions">
          <button class="btn primary" id="compress-btn" type="button">⬇ Comprimir y descargar</button>
        </div>

        <p class="status" id="status" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>
