  <main class="wrap">
    <header>
      <span class="badge"><span class="dot" aria-hidden="true"></span>100% en tu navegador · sin subir nada</span>
      <h1>Unir PDF</h1>
      <p class="subtitle">Combina varios PDFs en un único documento. Reordénalos como quieras y descarga el resultado.</p>
    </header>

    <section class="card" aria-labelledby="app-title">
      <h2 id="app-title" class="sr">Herramienta para unir PDF</h2>

      <!-- Paso 1: cargar -->
      <div id="loader">
        <div id="dropzone" class="dropzone" tabindex="0" role="button"
             aria-label="Selecciona o arrastra varios archivos PDF">
          <div class="icon" aria-hidden="true">📚</div>
          <div class="lead">Arrastra tus PDFs aquí o <strong>haz clic para elegirlos</strong></div>
          <div class="hint">Puedes seleccionar varios. Nada se envía a internet.</div>
        </div>
        <input id="file-input" type="file" accept="application/pdf,.pdf" multiple class="visually-hidden" />
      </div>

      <!-- Paso 2: ordenar y unir -->
      <div id="workspace" class="hidden">
        <div class="toolbar">
          <button class="btn" id="add-more-btn" type="button">Añadir más</button>
          <button class="btn ghost" id="clear-btn" type="button">Vaciar</button>
          <span class="count" id="count">0 archivos</span>
        </div>

        <ul class="file-list" id="file-list" aria-label="PDFs a unir (en orden)"></ul>

        <div class="actions">
          <button class="btn primary" id="merge-btn" type="button" disabled>⬇ Unir y descargar</button>
        </div>

        <p class="status" id="status" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>
