<main class="wrap wrap-code">
    <header>
      <span class="badge"><span class="dot" aria-hidden="true"></span>{{t.badge}}</span>
      <h1>{{t.h1}}</h1>
      <p class="subtitle">{{t.subtitle}}</p>
    </header>

    <section class="card" aria-labelledby="app-title">
      <h2 id="app-title" class="sr">{{t.cardAria}}</h2>
      <div class="code-tool jwt-tool">
        <label class="code-pane">
          <div class="code-bar">
            <span class="code-dots" aria-hidden="true"><i></i><i></i><i></i></span>
            <span class="code-bar-label">{{t.token}}</span>
            <span class="code-bar-actions"></span>
          </div>
          <textarea class="code-area jwt-input" id="jwt-input" spellcheck="false"
                    autocapitalize="off" autocomplete="off" autocorrect="off"
                    placeholder="{{t.tokenPlaceholder}}" aria-label="{{t.token}}"></textarea>
        </label>

        <p class="code-alert" id="jwt-alert" role="alert"></p>
        <p class="jwt-info" id="jwt-info" aria-live="polite"></p>

        <div class="code-io">
          <div class="code-pane code-pane-out">
            <div class="code-bar">
              <span class="code-dots" aria-hidden="true"><i></i><i></i><i></i></span>
              <span class="code-bar-label">{{t.header}}</span>
              <span class="code-bar-actions"></span>
            </div>
            <textarea class="code-area code-out" id="jwt-header" readonly
                      spellcheck="false" aria-label="{{t.header}}"></textarea>
          </div>
          <div class="code-pane code-pane-out">
            <div class="code-bar">
              <span class="code-dots" aria-hidden="true"><i></i><i></i><i></i></span>
              <span class="code-bar-label">{{t.payload}}</span>
              <span class="code-bar-actions"></span>
            </div>
            <textarea class="code-area code-out" id="jwt-payload" readonly
                      spellcheck="false" aria-label="{{t.payload}}"></textarea>
          </div>
        </div>

        <section class="tool-guide" id="jwt-guide"></section>
      </div>
    </section>
  </main>
