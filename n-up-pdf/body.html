<style>
    @media (min-width: 480px) { .controls { grid-template-columns: 1fr 1fr; align-items: end; } }

    /* Dibujo en vivo de cómo se reparte cada hoja (hoja gris, páginas violeta). */
    .nup-diagram-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 2px 0 22px; }
    .nup-diagram-label { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: .72rem; text-transform: uppercase; letter-spacing: .14em; color: rgb(var(--muted)); }
    .nup-diagram {
      height: 150px; display: grid; gap: 6px; padding: 7px;
      border: 1px solid rgb(var(--border)); border-radius: 8px;
      background: rgb(var(--surface-2) / 0.5);
    }
    .nup-diagram span {
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgb(var(--accent) / 0.45); border-radius: 4px;
      background: rgb(var(--accent) / 0.10); color: rgb(var(--accent));
      font-family: "JetBrains Mono", ui-monospace, monospace; font-size: .72rem; font-weight: 600;
    }

    /* En móvil: dibujo arriba, botón abajo. En escritorio: botón a la izquierda
       (centrado en altura) y dibujo a la derecha. */
    .nup-output { display: flex; flex-direction: column; gap: 22px; }
    .nup-output .nup-diagram-wrap { margin: 0; }
    @media (min-width: 600px) {
      .nup-output { flex-direction: row; align-items: center; gap: 28px; }
      .nup-output > * { flex: 1 1 0; }
      .nup-output .actions { order: -1; margin-bottom: 0; justify-content: center; }
    }
  </style>

  <main class="wrap">
    <header>
      <span class="badge"><span class="dot" aria-hidden="true"></span>{{t.badge}}</span>
      <h1>{{t.h1}}</h1>
      <p class="subtitle">{{t.subtitle}}</p>
    </header>

    <section class="card" aria-labelledby="app-title">
      <h2 id="app-title" class="sr">{{t.cardAria}}</h2>

      <div id="loader">
        <div id="dropzone" class="dropzone" tabindex="0" role="button"
             aria-label="{{t.dropAria}}">
          <div class="icon" aria-hidden="true">🗂️</div>
          <div class="lead">{{t.lead}}</div>
          <div class="hint">{{t.hint}}</div>
        </div>
        <input id="file-input" type="file" accept="application/pdf,.pdf" multiple class="visually-hidden" />
      </div>

      <div id="workspace" class="hidden">
        <div class="toolbar">
          <button class="btn" id="add-more-btn" type="button">{{t.addMore}}</button>
          <button class="btn ghost" id="clear-btn" type="button">{{t.clear}}</button>
          <span class="count" id="count"></span>
        </div>

        <ul class="file-list" id="file-list" aria-label="{{t.listAria}}"></ul>

        <div class="controls">
          <label class="field">
            <span class="field-label">{{t.labelPer}}</span>
            <select id="nup-per">
              <option value="2">2 {{t.optPer}}</option>
              <option value="4">4 {{t.optPer}}</option>
              <option value="6">6 {{t.optPer}}</option>
              <option value="9">9 {{t.optPer}}</option>
            </select>
          </label>
          <label class="field">
            <span class="field-label">{{t.labelOrient}}</span>
            <select id="nup-orient">
              <option value="portrait">{{t.optPortrait}}</option>
              <option value="landscape">{{t.optLandscape}}</option>
            </select>
          </label>
        </div>

        <div class="nup-output">
          <div class="nup-diagram-wrap" aria-hidden="true">
            <span class="nup-diagram-label">{{t.diagramLabel}}</span>
            <div class="nup-diagram" id="nup-diagram"></div>
          </div>

          <div class="actions">
            <button class="btn primary" id="apply-btn" type="button" disabled>{{t.applyBtn}}</button>
          </div>
        </div>

        <p class="status" id="status" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>
