<style>
    @media (min-width: 480px) { .controls { grid-template-columns: 1fr 1fr; align-items: end; } }
  </style>

  <main class="wrap">
    <header>
      <span class="badge"><span class="dot" aria-hidden="true"></span>{{t.badge}}</span>
      <h1>{{t.h1}}</h1>
      <p class="subtitle">{{t.subtitle}}</p>
    </header>

    <section class="card" aria-labelledby="app-title">
      <h2 id="app-title" class="sr">{{t.cardAria}}</h2>

      <div id="loader">
        <div id="dropzone" class="dropzone" tabindex="0" role="button"
             aria-label="{{t.dropAria}}">
          <div class="icon" aria-hidden="true">🖼️</div>
          <div class="lead">{{t.lead}}</div>
          <div class="hint">{{t.hint}}</div>
        </div>
        <input id="file-input" type="file" accept="image/*" class="visually-hidden" />
      </div>

      <div id="workspace" class="hidden">
        <div class="preview-box">
          <img id="result-preview" alt="{{t.previewAlt}}" />
        </div>
        <div class="preview-row">
          <span class="meta" id="file-info">—</span>
          <span class="spacer"></span>
          <button class="btn ghost" id="reset-btn" type="button">{{t.reset}}</button>
        </div>

        <div class="controls">
          <label class="field">
            <span class="field-label">{{t.labelTo}}</span>
            <select id="target-format"></select>
          </label>
          <label class="field" id="quality-field">
            <span class="field-label">{{t.labelQuality}} <b id="quality-val">85%</b></span>
            <input id="quality" type="range" min="30" max="100" value="85" />
          </label>
        </div>

        <p class="estimate" id="estimate" aria-live="polite"></p>

        <div class="actions">
          <button class="btn primary" id="convert-btn" type="button">{{t.convertBtn}}</button>
        </div>

        <p class="status" id="status" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>
