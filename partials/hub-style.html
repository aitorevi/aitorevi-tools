  <style>
    /* CSS específico del hub (la grid de herramientas) */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }
    .tool-card {
      display: flex; flex-direction: column; gap: 10px;
      padding: 24px;
      background: rgb(var(--surface) / 0.7);
      border: 1px solid rgb(var(--border));
      border-radius: var(--radius);
      box-shadow: 0 0 40px rgb(var(--accent) / 0.05), 0 14px 30px rgb(0 0 0 / 0.14);
      backdrop-filter: blur(10px);
      text-decoration: none; color: rgb(var(--fg));
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    a.tool-card:hover {
      transform: translateY(-3px);
      border-color: rgb(var(--accent));
      box-shadow: 0 0 40px rgb(var(--accent) / 0.12), 0 18px 40px rgb(0 0 0 / 0.2);
    }
    a.tool-card:focus-visible { outline: 3px solid rgb(var(--accent)); outline-offset: 3px; }
    .tool-name { font-family: "Outfit", system-ui, sans-serif; font-weight: 700; font-size: 1.2rem; margin: 0; }
    .tool-desc { color: rgb(var(--muted)); font-size: .92rem; margin: 0; flex: 1 1 auto; }
    .tool-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tool-tags span {
      font-family: "JetBrains Mono", ui-monospace, monospace; font-size: .64rem;
      text-transform: uppercase; letter-spacing: .12em;
      color: rgb(var(--muted)); background: rgb(var(--surface-2) / 0.7);
      border: 1px solid rgb(var(--border)); border-radius: 999px; padding: 3px 9px;
    }
    .tool-cta {
      font-family: "JetBrains Mono", ui-monospace, monospace; font-size: .76rem;
      text-transform: uppercase; letter-spacing: .15em; color: rgb(var(--accent));
      margin-top: 4px;
    }
    .tool-card.is-soon { opacity: .6; box-shadow: none; cursor: default; }
    .tool-card.is-soon .tool-cta { color: rgb(var(--muted)); }

    .tools-section + .tools-section { margin-top: 44px; }
    .section-title {
      display: flex; align-items: center; gap: 12px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em;
      color: rgb(var(--muted)); margin: 0 0 18px;
    }
    .section-title .dot {
      width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto;
      background: rgb(var(--accent)); box-shadow: 0 0 10px rgb(var(--accent) / 0.6);
    }
    .section-title::after { content: ""; flex: 1 1 auto; height: 1px; background: rgb(var(--border)); }
  </style>
